name: Docker Release

on:
  pull_request_target:
    types:
      - closed
    branches:
      - main
      - staging/**
      - canary/**

permissions:
  contents: write
  pull-requests: read

jobs:
  publish:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Match release label
        id: release-label
        uses: zwaldowski/match-label-action@v6
        with:
          allowed: release/major, release/minor, release/patch, release/prerelease
          default_match: release/prerelease

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine next Docker version
        id: bump
        uses: ./bump
        with:
          from: ${{ steps.release-label.outputs.match }}
          label-prefix: release/

      - name: Check release tag
        env:
          RELEASE_TAG: ${{ steps.bump.outputs.next-tag }}
        run: |
          if git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            echo "Tag ${RELEASE_TAG} already exists locally." >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null; then
            echo "Tag ${RELEASE_TAG} already exists on origin." >&2
            exit 1
          fi

      - name: Select Docker tags
        id: docker
        env:
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
        run: |
          {
            echo "tags<<EOF"
            echo "skulpture/kakak-bot:${{ steps.bump.outputs.next-tag }}"
            if [ "${BASE_BRANCH}" = "dev" ]; then
              echo "skulpture/kakak-bot:dev"
            fi
            if [ "${BASE_BRANCH}" = "main" ]; then
              case "${{ steps.bump.outputs.next-version }}" in
                *-*) ;;
                *) echo "skulpture/kakak-bot:latest" ;;
              esac
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            VERSION=${{ steps.bump.outputs.next-tag }}
          tags: ${{ steps.docker.outputs.tags }}

      - name: Push Git tag
        env:
          RELEASE_TAG: ${{ steps.bump.outputs.next-tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${RELEASE_TAG}" -m "${RELEASE_TAG}"
          git push origin "refs/tags/${RELEASE_TAG}"
