name: Docker Release

on:
  pull_request_target:
    types:
      - closed
    branches:
      - master
      - staging/**
      - canary/**

permissions:
  contents: write
  pull-requests: read

jobs:
  publish:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build --build-arg VERSION=${{ github.sha }} -t skulpture/kakak-bot:latest .

      - name: Match release label
        id: release-label
        uses: ./match-label
        with:
          allowed: release/major, release/minor, release/patch, release/prerelease
          default-match: release/prerelease

      - name: Determine next Docker version
        id: bump
        uses: ./bump
        with:
          from: ${{ steps.release-label.outputs.match }}
          label-prefix: release/

      - name: Check release tag
        env:
          RELEASE_TAG: ${{ steps.bump.outputs.next-tag }}
        run: |
          if git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            echo "Tag ${RELEASE_TAG} already exists locally." >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null; then
            echo "Tag ${RELEASE_TAG} already exists on origin." >&2
            exit 1
          fi

      - name: Select Docker tags
        id: docker
        env:
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
        run: |
          {
            echo "tags<<EOF"
            echo "skulpture/kakak-bot:${{ steps.bump.outputs.next-tag }}"
            if [ "${BASE_BRANCH}" = "master" ]; then
              case "${{ steps.bump.outputs.next-version }}" in
                *-*) ;;
                *) echo "skulpture/kakak-bot:latest" ;;
              esac
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Push Docker image
        env:
          TAGS: ${{ steps.docker.outputs.tags }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -n "${tag}" ] || continue
            docker tag skulpture/kakak-bot:latest "${tag}"
            docker push "${tag}"
          done <<< "${TAGS}"

      - name: Generate changelog
        id: changelog
        uses: ./changelog
        with:
          branch: ${{ github.event.pull_request.base.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Create release
        uses: ./release
        with:
          version: ${{ steps.bump.outputs.next-tag }}
          body: ${{ steps.changelog.outputs.unreleased-content }}
          token: ${{ secrets.GITHUB_TOKEN }}
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
