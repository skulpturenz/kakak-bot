name: "Release"
description: "Create a GitHub release for the latest unreleased semver tag in the repository"
inputs:
  version:
    description: "Version to release (e.g. v1.2.3). Latest tag based on current SemVer if not provided"
  body:
    description: Release content
  assets:
    description: "Newline or comma-separated files or globs to attach to the release (e.g. dist/*). When set, the release is created as a draft, assets are uploaded, then it is published atomically"
  token:
    description: "GitHub token"
    required: true
    default: ${{ github.token }}
  app-id:
    description: "GitHub App id. When set with private-key, an installation token is minted and used instead of token"
  private-key:
    description: "GitHub App private key (PEM)"
runs:
  using: "docker"
  image: "Dockerfile"
  args:
    - "--version"
    - "${{ inputs.version }}"
    - "--body"
    - "${{ inputs.body }}"
    - "--assets"
    - "${{ inputs.assets }}"
    - "--token"
    - "${{ inputs.token }}"
    - "--app-id"
    - "${{ inputs.app-id }}"
    - "--private-key"
    - "${{ inputs.private-key }}"
