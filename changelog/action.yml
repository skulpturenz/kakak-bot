name: "Changelog"
description: "Generate a changelog file and commit it"
inputs:
  message:
    description: "Commit message"
    required: true
    default: "chore: update changelog"
  branch:
    description: "Branch to commit to"
    required: true
  token:
    description: "GitHub token"
    required: true
    default: ${{ github.token }}
  config:
    description: "Path to a git-cliff configuration file. Uses the bundled default when empty"
  output:
    description: "Path to the changelog file"
    default: "CHANGELOG.md"
  app-id:
    description: "GitHub App id. When set with private-key, an installation token is minted and used instead of token"
  private-key:
    description: "GitHub App private key (PEM)"
outputs:
  commit-sha:
    description: "SHA of the changelog commit"
  content:
    description: "Complete changelog content"
  unreleased-content:
    description: "Unreleased changelog content"
runs:
  using: "docker"
  image: "Dockerfile"
  args:
    - "--message"
    - "${{ inputs.message }}"
    - "--branch"
    - "${{ inputs.branch }}"
    - "--token"
    - "${{ inputs.token }}"
    - "--config"
    - "${{ inputs.config }}"
    - "--output"
    - "${{ inputs.output }}"
    - "--app-id"
    - "${{ inputs.app-id }}"
    - "--private-key"
    - "${{ inputs.private-key }}"
